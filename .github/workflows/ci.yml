name: CI - Test & Build

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 5

  build:
    name: Build Debug APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Create local.properties for CI
        run: |
          echo "SUPABASE_URL=https://ci-placeholder.supabase.co" >> local.properties
          echo "SUPABASE_ANON_KEY=ci-placeholder-anon-key" >> local.properties

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: healthdispatch-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
