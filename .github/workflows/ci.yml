name: CI - Test, Build & Publish

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "wrapper"

      - name: Run unit tests
        run: gradle test

  build:
    name: Build APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "wrapper"

      - name: Build APK
        run: gradle assemble${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: healthdispatch-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          retention-days: 30
